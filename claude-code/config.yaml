name: "Claude Code for Home Assistant"
description: "Claude Code CLI with web terminal, full config management, and MCP integration for smart home control"
version: "2.2.2"
slug: "claude_code"
url: "https://github.com/nateober/ha-claude-code-addon"
stage: experimental
init: false
arch:
  - aarch64
  - amd64
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 7681
panel_icon: "mdi:robot"
panel_title: "Claude Code"
startup: application
map:
  - config:rw
  - ssl:ro
  - addons:ro
  - backup:rw
  - share:rw
ports:
  "8080/tcp": null
ports_description:
  "8080/tcp": "Claude Code API (optional, for direct access outside ingress)"
options:
  anthropic_api_key: ""
  enable_ha_mcp: true
  ha_mcp_url: ""
  enable_api: true
  api_port: 8080
  default_model: "sonnet"
schema:
  anthropic_api_key: str?
  enable_ha_mcp: bool?
  ha_mcp_url: str?
  enable_api: bool?
  api_port: int?
  default_model: str?
environment:
  TERM: xterm-256color
